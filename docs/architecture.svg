<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="740" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">ShellBot v0.2 — System Architecture</text>

  <!-- ═══════════ LAYER 1: Entry Point ═══════════ -->
  <rect x="330" y="58" width="240" height="44" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">shellbot.sh</text>
  <text x="450" y="72" text-anchor="middle" font-size="9" fill="#94a3b8">Entry Point</text>

  <!-- Arrow: entry → loop -->
  <line x1="450" y1="102" x2="450" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ LAYER 2: Core Loop ═══════════ -->
  <rect x="270" y="130" width="360" height="56" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="450" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">loop.sh</text>
  <text x="450" y="170" text-anchor="middle" font-size="10" fill="#dbeafe">Unified Loop · Function Calling · Single Conversation Stream</text>

  <!-- ═══════════ LAYER 3: API + Prompts ═══════════ -->
  <line x1="370" y1="186" x2="310" y2="214" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="186" x2="590" y2="214" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="214" width="230" height="44" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="285" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">api.sh</text>
  <text x="285" y="228" text-anchor="middle" font-size="9" fill="#ddd6fe">OpenRouter API · Stream + Fallback</text>

  <rect x="500" y="214" width="230" height="44" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="615" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">prompts/</text>
  <text x="615" y="228" text-anchor="middle" font-size="9" fill="#ddd6fe">system.sh · loop_system.sh</text>

  <!-- ═══════════ LAYER 4: Tool System ═══════════ -->
  <line x1="450" y1="186" x2="450" y2="290" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>
  <text x="470" y="246" font-size="9" fill="#3b82f6" font-weight="500">tool_calls</text>

  <rect x="290" y="290" width="320" height="56" rx="10" fill="#059669" filter="url(#shadow)"/>
  <text x="450" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">tools.sh + tools_schema.sh</text>
  <text x="450" y="330" text-anchor="middle" font-size="10" fill="#d1fae5">Dispatch · @tool/@param → OpenAI JSON Schema</text>

  <!-- ═══════════ LAYER 5: Tool Implementations ═══════════ -->
  <line x1="450" y1="346" x2="450" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Local Ops -->
  <rect x="40" y="370" width="190" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="135" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">🖥 Local Ops</text>
  <text x="135" y="408" text-anchor="middle" font-size="10" fill="#475569">run_shell</text>
  <text x="135" y="423" text-anchor="middle" font-size="10" fill="#475569">read_file · write_file</text>
  <text x="135" y="438" text-anchor="middle" font-size="10" fill="#475569">list_files · search_files</text>
  <text x="135" y="453" text-anchor="middle" font-size="10" fill="#475569">calc</text>

  <!-- Planning -->
  <rect x="245" y="370" width="140" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">📋 Planning</text>
  <text x="315" y="408" text-anchor="middle" font-size="10" fill="#475569">plan_step</text>
  <text x="315" y="426" text-anchor="middle" font-size="9" fill="#94a3b8">Soft planning via</text>
  <text x="315" y="440" text-anchor="middle" font-size="9" fill="#94a3b8">prompt engineering</text>

  <!-- Web & KB -->
  <rect x="400" y="370" width="190" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">🌐 Web &amp; KB</text>
  <text x="495" y="408" text-anchor="middle" font-size="10" fill="#475569">search_web (Tavily)</text>
  <text x="495" y="423" text-anchor="middle" font-size="10" fill="#475569">read_webpage (JINA)</text>
  <text x="495" y="438" text-anchor="middle" font-size="10" fill="#475569">search_rhkb · read_rhkb</text>
  <text x="495" y="453" text-anchor="middle" font-size="10" fill="#475569">rhkb_auth (SSO)</text>

  <!-- Memory -->
  <rect x="605" y="370" width="170" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">🧠 Memory</text>
  <text x="690" y="408" text-anchor="middle" font-size="10" fill="#475569">save_memory</text>
  <text x="690" y="423" text-anchor="middle" font-size="10" fill="#475569">search_memory</text>
  <text x="690" y="441" text-anchor="middle" font-size="9" fill="#94a3b8">SQLite3 + FTS5</text>
  <text x="690" y="455" text-anchor="middle" font-size="9" fill="#94a3b8">memory.db</text>

  <!-- ═══════════ LAYER 6: Infrastructure ═══════════ -->
  <line x1="135" y1="470" x2="135" y2="520" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="315" y1="470" x2="315" y2="520" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="495" y1="470" x2="495" y2="520" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="690" y1="470" x2="690" y2="520" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Security -->
  <rect x="40" y="520" width="190" height="44" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="135" y="546" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">security.sh</text>
  <text x="135" y="534" text-anchor="middle" font-size="9" fill="#fef3c7">Dangerous cmd detection</text>

  <!-- Context -->
  <rect x="245" y="520" width="140" height="44" rx="8" fill="#6366f1" filter="url(#shadow)"/>
  <text x="315" y="546" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">context.sh</text>
  <text x="315" y="534" text-anchor="middle" font-size="9" fill="#e0e7ff">Context window mgmt</text>

  <!-- History -->
  <rect x="400" y="520" width="190" height="44" rx="8" fill="#ec4899" filter="url(#shadow)"/>
  <text x="495" y="546" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">history.sh</text>
  <text x="495" y="534" text-anchor="middle" font-size="9" fill="#fce7f3">Conversation history</text>

  <!-- Memory impl -->
  <rect x="605" y="520" width="170" height="44" rx="8" fill="#14b8a6" filter="url(#shadow)"/>
  <text x="690" y="546" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">memory.sh</text>
  <text x="690" y="534" text-anchor="middle" font-size="9" fill="#ccfbf1">SQLite3 + FTS5</text>

  <!-- ═══════════ LAYER 7: Compressor + Config ═══════════ -->
  <line x1="495" y1="564" x2="495" y2="598" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <rect x="370" y="598" width="250" height="44" rx="8" fill="#dc2626" filter="url(#shadow)"/>
  <text x="495" y="624" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">compressor.sh</text>
  <text x="495" y="612" text-anchor="middle" font-size="9" fill="#fecaca">LLM-based context compression</text>

  <!-- Config -->
  <rect x="40" y="598" width="150" height="44" rx="8" fill="#475569" filter="url(#shadow)"/>
  <text x="115" y="624" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">config.sh</text>
  <text x="115" y="612" text-anchor="middle" font-size="9" fill="#cbd5e1">Constants &amp; env vars</text>

  <!-- UI -->
  <rect x="200" y="598" width="150" height="44" rx="8" fill="#475569" filter="url(#shadow)"/>
  <text x="275" y="624" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ui.sh</text>
  <text x="275" y="612" text-anchor="middle" font-size="9" fill="#cbd5e1">Spinner &amp; output format</text>

  <!-- ═══════════ External Services (right side) ═══════════ -->
  <rect x="700" y="598" width="180" height="44" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="790" y="622" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">☁ External APIs</text>
  <text x="790" y="612" text-anchor="middle" font-size="8" fill="#94a3b8">OpenRouter · Tavily · JINA</text>

  <!-- Arrow: api.sh → external (clean diagonal) -->
  <path d="M400,236 L700,598" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,4" fill="none" marker-end="url(#arrow)"/>

  <!-- ═══════════ Data Stores (right side, no overlap) ═══════════ -->
  <rect x="700" y="510" width="180" height="70" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="790" y="530" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">💾 Data Stores</text>
  <text x="790" y="548" text-anchor="middle" font-size="9" fill="#94a3b8">~/.shellbot/memory.db</text>
  <text x="790" y="562" text-anchor="middle" font-size="9" fill="#94a3b8">~/.shellbot/.env / Keychain</text>

  <!-- Arrow: memory.sh → data store -->
  <line x1="775" y1="542" x2="700" y2="545" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,4" marker-end="url(#arrow)"/>

  <!-- ═══════════ Legend ═══════════ -->
  <rect x="40" y="670" width="820" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="700" font-size="10" font-weight="600" fill="#0f172a">Legend:</text>
  <line x1="120" y1="696" x2="150" y2="696" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="160" y="700" font-size="9" fill="#475569">source / call</text>
  <line x1="250" y1="696" x2="280" y2="696" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>
  <text x="290" y="700" font-size="9" fill="#475569">tool_calls flow</text>
  <line x1="400" y1="696" x2="430" y2="696" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="440" y="700" font-size="9" fill="#475569">external dependency</text>
  <rect x="570" y="688" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="592" y="700" font-size="9" fill="#475569">core</text>
  <rect x="630" y="688" width="16" height="16" rx="3" fill="#059669"/>
  <text x="652" y="700" font-size="9" fill="#475569">tools</text>
  <rect x="690" y="688" width="16" height="16" rx="3" fill="#475569"/>
  <text x="712" y="700" font-size="9" fill="#475569">infra</text>
  <rect x="740" y="688" width="16" height="16" rx="3" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="762" y="700" font-size="9" fill="#475569">external</text>
</svg>
