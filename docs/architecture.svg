<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 680" font-family="'Berkeley Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arr-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="680" fill="#fff"/>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#000">ShellBot v0.2 — Architecture</text>

  <!-- ──────── LAYER 1: Entry ──────── -->
  <rect x="340" y="44" width="200" height="36" rx="4" fill="#000"/>
  <text x="440" y="67" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">shellbot.sh</text>

  <!-- fork arrows -->
  <line x1="390" y1="80" x2="220" y2="108" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="490" y1="80" x2="660" y2="108" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="280" y="94" font-size="9" fill="#666">default</text>
  <text x="570" y="94" font-size="9" fill="#666">--loop</text>

  <!-- ──────── LAYER 2: Two Modes ──────── -->
  <rect x="120" y="108" width="200" height="40" rx="4" fill="#333"/>
  <text x="220" y="131" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">react.sh</text>
  <text x="220" y="121" text-anchor="middle" font-size="8" fill="#aaa">Single-turn FC</text>

  <rect x="560" y="108" width="200" height="40" rx="4" fill="#333"/>
  <text x="660" y="131" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">loop.sh</text>
  <text x="660" y="121" text-anchor="middle" font-size="8" fill="#aaa">Multi-turn FC</text>

  <!-- ──────── LAYER 3: Shared Services ──────── -->
  <!-- react.sh uses -->
  <line x1="180" y1="148" x2="180" y2="176" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="260" y1="148" x2="380" y2="176" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="220" y1="148" x2="540" y2="176" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- loop.sh uses -->
  <line x1="620" y1="148" x2="620" y2="176" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="700" y1="148" x2="500" y2="176" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="660" y1="148" x2="340" y2="176" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- api.sh -->
  <rect x="100" y="176" width="160" height="36" rx="4" fill="#555"/>
  <text x="180" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">api.sh</text>

  <!-- tools dispatch -->
  <rect x="280" y="176" width="280" height="36" rx="4" fill="#555"/>
  <text x="420" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">tools.sh + tools_schema.sh</text>

  <!-- memory -->
  <rect x="580" y="176" width="160" height="36" rx="4" fill="#555"/>
  <text x="660" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">memory.sh</text>

  <!-- annotations -->
  <text x="180" y="225" text-anchor="middle" font-size="8" fill="#888">stream + fallback</text>
  <text x="180" y="235" text-anchor="middle" font-size="8" fill="#888">OpenRouter API</text>
  <text x="420" y="225" text-anchor="middle" font-size="8" fill="#888">@tool/@param annotations</text>
  <text x="420" y="235" text-anchor="middle" font-size="8" fill="#888">→ OpenAI JSON Schema</text>
  <text x="660" y="225" text-anchor="middle" font-size="8" fill="#888">SQLite3 + FTS5</text>
  <text x="660" y="235" text-anchor="middle" font-size="8" fill="#888">memories.db</text>

  <!-- ──────── LAYER 4: Tool Implementations ──────── -->
  <line x1="420" y1="212" x2="420" y2="256" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="50" y="256" width="780" height="90" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="70" y="272" font-size="9" font-weight="600" fill="#666">tools/</text>

  <!-- Tool boxes inside -->
  <rect x="70" y="280" width="100" height="52" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="120" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#333">run_shell</text>
  <text x="120" y="322" text-anchor="middle" font-size="8" fill="#888">→ security.sh</text>

  <rect x="185" y="280" width="100" height="52" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="235" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#333">read_file</text>
  <text x="235" y="310" text-anchor="middle" font-size="8" fill="#888">write_file</text>
  <text x="235" y="322" text-anchor="middle" font-size="8" fill="#888">search_files</text>

  <rect x="300" y="280" width="100" height="52" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="350" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#333">list_files</text>
  <text x="350" y="310" text-anchor="middle" font-size="8" fill="#888">calc</text>

  <rect x="415" y="280" width="100" height="52" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="465" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#333">plan_step</text>
  <text x="465" y="322" text-anchor="middle" font-size="8" fill="#888">(loop only)</text>

  <rect x="530" y="280" width="140" height="52" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="600" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#333">search_web</text>
  <text x="600" y="310" text-anchor="middle" font-size="8" fill="#888">read_webpage</text>
  <text x="600" y="322" text-anchor="middle" font-size="8" fill="#888">search/read_rhkb</text>

  <rect x="685" y="280" width="120" height="52" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="745" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#333">save_memory</text>
  <text x="745" y="310" text-anchor="middle" font-size="8" fill="#888">search_memory</text>
  <text x="745" y="322" text-anchor="middle" font-size="8" fill="#888">→ memory.sh</text>

  <!-- ──────── LAYER 5: Supporting Libs ──────── -->
  <!-- loop.sh also uses these directly -->
  <line x1="660" y1="148" x2="750" y2="380" stroke="#333" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr-d)"/>
  <line x1="660" y1="148" x2="550" y2="380" stroke="#333" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr-d)"/>

  <rect x="50" y="380" width="150" height="36" rx="4" fill="#888"/>
  <text x="125" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">security.sh</text>

  <rect x="220" y="380" width="150" height="36" rx="4" fill="#888"/>
  <text x="295" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">ui.sh</text>

  <rect x="390" y="380" width="150" height="36" rx="4" fill="#888"/>
  <text x="465" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">context.sh</text>
  <text x="465" y="393" text-anchor="middle" font-size="7" fill="#bbb">loop only</text>

  <rect x="560" y="380" width="150" height="36" rx="4" fill="#888"/>
  <text x="635" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">history.sh</text>

  <rect x="730" y="380" width="110" height="36" rx="4" fill="#888"/>
  <text x="785" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">config.sh</text>

  <!-- annotations under -->
  <text x="125" y="428" text-anchor="middle" font-size="8" fill="#888">dangerous cmd</text>
  <text x="125" y="438" text-anchor="middle" font-size="8" fill="#888">detection</text>
  <text x="295" y="428" text-anchor="middle" font-size="8" fill="#888">spinner, output</text>
  <text x="295" y="438" text-anchor="middle" font-size="8" fill="#888">formatting</text>
  <text x="465" y="428" text-anchor="middle" font-size="8" fill="#888">goal tracking</text>
  <text x="465" y="438" text-anchor="middle" font-size="8" fill="#888">step recording</text>
  <text x="635" y="428" text-anchor="middle" font-size="8" fill="#888">JSON messages</text>
  <text x="635" y="438" text-anchor="middle" font-size="8" fill="#888">auto-compress</text>
  <text x="785" y="428" text-anchor="middle" font-size="8" fill="#888">env, constants</text>
  <text x="785" y="438" text-anchor="middle" font-size="8" fill="#888">data paths</text>

  <!-- ──────── LAYER 6: Compressor (lazy-loaded) ──────── -->
  <line x1="635" y1="416" x2="635" y2="476" stroke="#333" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr-d)"/>
  <text x="665" y="454" font-size="8" fill="#888">lazy source</text>

  <rect x="540" y="476" width="200" height="36" rx="4" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="640" y="498" text-anchor="middle" font-size="10" font-weight="600" fill="#333">compressor.sh</text>
  <text x="640" y="486" text-anchor="middle" font-size="7" fill="#888">LLM-based summarization</text>

  <!-- ──────── Prompts ──────── -->
  <rect x="50" y="476" width="200" height="36" rx="4" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="150" y="498" text-anchor="middle" font-size="10" font-weight="600" fill="#333">prompts/system.sh</text>

  <rect x="270" y="476" width="220" height="36" rx="4" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="498" text-anchor="middle" font-size="10" font-weight="600" fill="#333">prompts/loop_system.sh</text>
  <text x="380" y="487" text-anchor="middle" font-size="7" fill="#888">loop only</text>

  <!-- ──────── External ──────── -->
  <rect x="50" y="556" width="250" height="36" rx="4" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="175" y="578" text-anchor="middle" font-size="9" font-weight="600" fill="#888">OpenRouter API (LLM)</text>

  <rect x="320" y="556" width="220" height="36" rx="4" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="430" y="578" text-anchor="middle" font-size="9" font-weight="600" fill="#888">Tavily / JINA Reader</text>

  <rect x="560" y="556" width="200" height="36" rx="4" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="660" y="578" text-anchor="middle" font-size="9" font-weight="600" fill="#888">Red Hat KB (SSO)</text>

  <!-- arrows from api/tools to external -->
  <line x1="180" y1="212" x2="175" y2="556" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arr-d)"/>
  <line x1="600" y1="332" x2="430" y2="556" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arr-d)"/>

  <!-- ──────── Data ──────── -->
  <rect x="50" y="610" width="350" height="36" rx="4" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="225" y="632" text-anchor="middle" font-size="9" font-weight="600" fill="#888">~/.shellbot/  (history.json, context.json)</text>

  <rect x="420" y="610" width="340" height="36" rx="4" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="590" y="632" text-anchor="middle" font-size="9" font-weight="600" fill="#888">~/.shellbot/memories.db  (SQLite3+FTS5)</text>

  <!-- ──────── Legend ──────── -->
  <rect x="50" y="654" width="780" height="20" rx="3" fill="#f8f8f8"/>
  <line x1="60" y1="664" x2="85" y2="664" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="90" y="668" font-size="8" fill="#666">source/call</text>
  <line x1="160" y1="664" x2="185" y2="664" stroke="#333" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr-d)"/>
  <text x="190" y="668" font-size="8" fill="#666">indirect/lazy</text>
  <rect x="270" y="658" width="12" height="12" rx="2" fill="#000"/>
  <text x="288" y="668" font-size="8" fill="#666">entry</text>
  <rect x="320" y="658" width="12" height="12" rx="2" fill="#333"/>
  <text x="338" y="668" font-size="8" fill="#666">mode</text>
  <rect x="370" y="658" width="12" height="12" rx="2" fill="#555"/>
  <text x="388" y="668" font-size="8" fill="#666">service</text>
  <rect x="430" y="658" width="12" height="12" rx="2" fill="#888"/>
  <text x="448" y="668" font-size="8" fill="#666">support</text>
  <rect x="500" y="658" width="12" height="12" rx="2" fill="none" stroke="#333" stroke-dasharray="3,2"/>
  <text x="518" y="668" font-size="8" fill="#666">lazy/on-demand</text>
  <rect x="600" y="658" width="12" height="12" rx="2" fill="none" stroke="#aaa" stroke-dasharray="2,2"/>
  <text x="618" y="668" font-size="8" fill="#666">external/data</text>
</svg>
