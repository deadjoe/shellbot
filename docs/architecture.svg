<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 720" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
    <marker id="arr-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arr-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- ═══════════════════ ARROWS (drawn first → behind components) ═══════════════════ -->

  <!-- shellbot.sh → react.sh (default) -->
  <line x1="490" y1="82" x2="310" y2="118" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="385" y="92" fill="#64748b" font-size="8" text-anchor="middle">default</text>

  <!-- shellbot.sh → loop.sh (loop flag) -->
  <line x1="570" y1="82" x2="720" y2="118" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="660" y="92" fill="#64748b" font-size="8" text-anchor="middle">--loop</text>

  <!-- react.sh → api.sh -->
  <line x1="240" y1="162" x2="190" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- react.sh → tools.sh -->
  <line x1="300" y1="162" x2="430" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- react.sh → memory.sh -->
  <line x1="350" y1="162" x2="700" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- loop.sh → api.sh -->
  <line x1="690" y1="162" x2="220" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- loop.sh → tools.sh -->
  <line x1="730" y1="162" x2="490" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- loop.sh → memory.sh -->
  <line x1="770" y1="162" x2="760" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- loop.sh → context.sh (loop only) -->
  <line x1="810" y1="162" x2="880" y2="348" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-emerald)"/>
  <text x="855" y="270" fill="#64748b" font-size="7" transform="rotate(-90 855 270)">loop only</text>

  <!-- tools.sh → tools/ directory -->
  <line x1="460" y1="258" x2="460" y2="318" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- tools/ → security.sh -->
  <line x1="200" y1="390" x2="120" y2="438" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>

  <!-- memory.sh → memories.db -->
  <line x1="760" y1="258" x2="760" y2="438" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- api.sh → OpenRouter -->
  <line x1="170" y1="258" x2="170" y2="438" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- tools/ → external APIs -->
  <line x1="600" y1="390" x2="550" y2="438" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- tools/ → RH KB -->
  <line x1="700" y1="390" x2="750" y2="438" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- history.sh → compressor.sh (lazy source) -->
  <line x1="860" y1="476" x2="860" y2="530" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="876" y="506" fill="#94a3b8" font-size="7">lazy</text>

  <!-- ═══════════════════ LAYER 1: Entry Point ═══════════════════ -->

  <!-- shellbot.sh -->
  <rect x="430" y="40" width="200" height="42" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="530" y="65" fill="#164e63" font-size="12" font-weight="600" text-anchor="middle">shellbot.sh</text>
  <text x="530" y="76" fill="#0891b2" font-size="7" text-anchor="middle">entry point</text>

  <!-- ═══════════════════ LAYER 2: Two Modes ═══════════════════ -->

  <!-- react.sh -->
  <rect x="200" y="118" width="180" height="44" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="290" y="142" fill="#064e3b" font-size="11" font-weight="600" text-anchor="middle">react.sh</text>
  <text x="290" y="155" fill="#64748b" font-size="8" text-anchor="middle">Single-turn FC</text>

  <!-- loop.sh -->
  <rect x="640" y="118" width="180" height="44" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="730" y="142" fill="#064e3b" font-size="11" font-weight="600" text-anchor="middle">loop.sh</text>
  <text x="730" y="155" fill="#64748b" font-size="8" text-anchor="middle">Multi-turn FC</text>

  <!-- ═══════════════════ LAYER 3: Core Services ═══════════════════ -->

  <!-- api.sh -->
  <rect x="70" y="218" width="200" height="40" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="170" y="240" fill="#064e3b" font-size="11" font-weight="600" text-anchor="middle">api.sh</text>
  <text x="170" y="253" fill="#64748b" font-size="8" text-anchor="middle">stream + fallback · OpenRouter</text>

  <!-- tools.sh + tools_schema.sh -->
  <rect x="310" y="218" width="300" height="40" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="460" y="240" fill="#064e3b" font-size="11" font-weight="600" text-anchor="middle">tools.sh + tools_schema.sh</text>
  <text x="460" y="253" fill="#64748b" font-size="8" text-anchor="middle">@tool/@param → OpenAI JSON Schema</text>

  <!-- memory.sh -->
  <rect x="650" y="218" width="220" height="40" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="760" y="240" fill="#064e3b" font-size="11" font-weight="600" text-anchor="middle">memory.sh</text>
  <text x="760" y="253" fill="#64748b" font-size="8" text-anchor="middle">SQLite3 + FTS5</text>

  <!-- ═══════════════════ LAYER 4: Tool Implementations ═══════════════════ -->

  <!-- tools/ boundary -->
  <rect x="50" y="318" width="730" height="78" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="62" y="332" fill="#ea580c" font-size="9" font-weight="600">tools/</text>

  <!-- run_shell -->
  <rect x="70" y="342" width="110" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="125" y="362" fill="#7c2d12" font-size="10" font-weight="600" text-anchor="middle">run_shell</text>
  <text x="125" y="380" fill="#e11d48" font-size="7" text-anchor="middle">→ security.sh</text>

  <!-- file tools -->
  <rect x="195" y="342" width="130" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="260" y="360" fill="#7c2d12" font-size="10" font-weight="600" text-anchor="middle">read_file</text>
  <text x="260" y="374" fill="#64748b" font-size="8" text-anchor="middle">write_file</text>
  <text x="260" y="386" fill="#64748b" font-size="8" text-anchor="middle">search_files</text>

  <!-- list_files + calc -->
  <rect x="340" y="342" width="100" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="390" y="362" fill="#7c2d12" font-size="10" font-weight="600" text-anchor="middle">list_files</text>
  <text x="390" y="380" fill="#64748b" font-size="8" text-anchor="middle">calc</text>

  <!-- plan_step (loop only) -->
  <rect x="455" y="342" width="100" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="505" y="362" fill="#7c2d12" font-size="10" font-weight="600" text-anchor="middle">plan_step</text>
  <text x="505" y="380" fill="#64748b" font-size="7" text-anchor="middle">loop only</text>

  <!-- web tools -->
  <rect x="570" y="342" width="100" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="620" y="360" fill="#7c2d12" font-size="10" font-weight="600" text-anchor="middle">search_web</text>
  <text x="620" y="374" fill="#64748b" font-size="8" text-anchor="middle">read_webpage</text>
  <text x="620" y="386" fill="#64748b" font-size="8" text-anchor="middle">search/read_rhkb</text>

  <!-- memory tools -->
  <rect x="685" y="342" width="85" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="728" y="360" fill="#7c2d12" font-size="9" font-weight="600" text-anchor="middle">save_mem</text>
  <text x="728" y="374" fill="#64748b" font-size="8" text-anchor="middle">search_mem</text>
  <text x="728" y="386" fill="#64748b" font-size="7" text-anchor="middle">→ memory.sh</text>

  <!-- ═══════════════════ LAYER 5: Supporting Libraries ═══════════════════ -->

  <!-- security.sh -->
  <rect x="40" y="438" width="160" height="38" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="120" y="458" fill="#881337" font-size="10" font-weight="600" text-anchor="middle">security.sh</text>
  <text x="120" y="470" fill="#64748b" font-size="8" text-anchor="middle">dangerous cmd detection</text>

  <!-- ui.sh -->
  <rect x="220" y="438" width="130" height="38" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="285" y="458" fill="#334155" font-size="10" font-weight="600" text-anchor="middle">ui.sh</text>
  <text x="285" y="470" fill="#64748b" font-size="8" text-anchor="middle">spinner · output fmt</text>

  <!-- config.sh -->
  <rect x="370" y="438" width="130" height="38" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="435" y="458" fill="#334155" font-size="10" font-weight="600" text-anchor="middle">config.sh</text>
  <text x="435" y="470" fill="#64748b" font-size="8" text-anchor="middle">env · constants · paths</text>

  <!-- context.sh (loop only) -->
  <rect x="810" y="348" width="150" height="38" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="885" y="368" fill="#064e3b" font-size="10" font-weight="600" text-anchor="middle">context.sh</text>
  <text x="885" y="380" fill="#64748b" font-size="8" text-anchor="middle">goal tracking · steps</text>

  <!-- history.sh -->
  <rect x="780" y="438" width="160" height="38" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="860" y="458" fill="#334155" font-size="10" font-weight="600" text-anchor="middle">history.sh</text>
  <text x="860" y="470" fill="#64748b" font-size="8" text-anchor="middle">JSON msgs · auto-compress</text>

  <!-- compressor.sh (lazy-loaded) -->
  <rect x="760" y="530" width="200" height="38" rx="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="860" y="550" fill="#64748b" font-size="10" font-weight="600" text-anchor="middle">compressor.sh</text>
  <text x="860" y="562" fill="#94a3b8" font-size="8" text-anchor="middle">LLM-based summarization</text>

  <!-- ═══════════════════ LAYER 6: Prompts ═══════════════════ -->

  <!-- prompts/system.sh -->
  <rect x="520" y="438" width="120" height="38" rx="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="580" y="460" fill="#64748b" font-size="9" font-weight="600" text-anchor="middle">prompts/system.sh</text>

  <!-- prompts/loop_system.sh -->
  <rect x="660" y="438" width="110" height="38" rx="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="715" y="456" fill="#64748b" font-size="9" font-weight="600" text-anchor="middle">loop_system.sh</text>
  <text x="715" y="468" fill="#94a3b8" font-size="7" text-anchor="middle">loop only</text>

  <!-- ═══════════════════ EXTERNAL SERVICES ═══════════════════ -->

  <!-- OpenRouter API -->
  <rect x="70" y="530" width="200" height="38" rx="6" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="170" y="552" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">OpenRouter API</text>
  <text x="170" y="563" fill="#64748b" font-size="7" text-anchor="middle">LLM inference</text>

  <!-- Tavily / JINA -->
  <rect x="300" y="530" width="200" height="38" rx="6" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="552" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">Tavily / JINA Reader</text>
  <text x="400" y="563" fill="#64748b" font-size="7" text-anchor="middle">Web search · page fetch</text>

  <!-- Red Hat KB -->
  <rect x="530" y="530" width="200" height="38" rx="6" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="630" y="552" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">Red Hat KB</text>
  <text x="630" y="563" fill="#64748b" font-size="7" text-anchor="middle">SSO authenticated</text>

  <!-- arrows from api/external to external -->
  <line x1="170" y1="476" x2="170" y2="528" stroke="#d97706" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="396" x2="500" y2="528" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <line x1="640" y1="396" x2="630" y2="528" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════ DATA STORES ═══════════════════ -->

  <!-- ~/.shellbot/ -->
  <rect x="70" y="610" width="300" height="38" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="220" y="632" fill="#5b21b6" font-size="9" font-weight="600" text-anchor="middle">~/.shellbot/</text>
  <text x="220" y="643" fill="#64748b" font-size="7" text-anchor="middle">history.json · context.json</text>

  <!-- memories.db -->
  <rect x="400" y="610" width="250" height="38" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="525" y="632" fill="#5b21b6" font-size="9" font-weight="600" text-anchor="middle">~/.shellbot/memories.db</text>
  <text x="525" y="643" fill="#64748b" font-size="7" text-anchor="middle">SQLite3 + FTS5</text>

  <!-- data store arrows -->
  <line x1="760" y1="476" x2="525" y2="608" stroke="#7c3aed" stroke-width="1" marker-end="url(#arr-violet)"/>

  <!-- ═══════════════════ LEGEND ═══════════════════ -->
  <text x="880" y="622" fill="#1e293b" font-size="10" font-weight="600">Legend</text>

  <rect x="880" y="634" width="14" height="9" rx="2" fill="#ecfeff" stroke="#0891b2" stroke-width="1"/>
  <text x="900" y="641" fill="#64748b" font-size="8">Entry</text>

  <rect x="880" y="649" width="14" height="9" rx="2" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="900" y="656" fill="#64748b" font-size="8">Service</text>

  <rect x="880" y="664" width="14" height="9" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="900" y="671" fill="#64748b" font-size="8">Tool Impl</text>

  <rect x="880" y="679" width="14" height="9" rx="2" fill="#fff1f2" stroke="#e11d48" stroke-width="1"/>
  <text x="900" y="686" fill="#64748b" font-size="8">Security</text>

  <rect x="880" y="694" width="14" height="9" rx="2" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="900" y="701" fill="#64748b" font-size="8">Database</text>

  <line x1="880" y1="711" x2="894" y2="711" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="900" y="714" fill="#64748b" font-size="8">External</text>
</svg>
